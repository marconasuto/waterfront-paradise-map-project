<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manfredonia — Mappa della costa</title>
    <meta
      name="description"
      content="Mappa multi-livello e storymap della costa di Manfredonia (Puglia)."
    />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <aside id="story-panel" aria-label="Storymap della costa"></aside>
      <div id="map" aria-label="Mappa interattiva della costa di Manfredonia"></div>
      <aside id="layer-panel" aria-label="Pannello dei livelli">
        <button
          id="layer-panel-toggle"
          class="layer-panel__toggle"
          type="button"
          aria-label="Chiudi pannello dei livelli"
          title="Chiudi / apri il pannello dei livelli"
        >
          ›
        </button>
        <div class="layer-panel__inner">
          <section id="layer-panel-list"></section>
          <section
            id="overlay-list"
            aria-label="Overlay temporanei trascinati dall'utente"
          ></section>
        </div>
      </aside>
      <noscript>
        Questa applicazione richiede JavaScript per visualizzare la mappa.
      </noscript>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
