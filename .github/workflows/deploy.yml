name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "config/**"
      - "content/**"
      - "data/catalog.yaml"
      - "data/processed/style.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs from older pushes; only deploy the latest commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install webapp dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build webapp
        env:
          # Public token from repo Settings → Secrets and variables → Actions.
          # Restrict the token by URL in the Mapbox dashboard once the
          # final URL is known.
          VITE_MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          # GH Pages serves the site at /<repo-name>/; configure-pages
          # gives us the right path automatically.
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
